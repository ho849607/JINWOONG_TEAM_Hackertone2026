<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bundled Page</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #141a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #__bundler_loading {
        position: fixed;
        bottom: 20px;
        right: 20px;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif;
        color: #666;
        background: #fff;
        padding: 8px 14px;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
        z-index: 10000;
    }

    #__bundler_thumbnail {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #141a2e;
        z-index: 9999;
    }

    #__bundler_thumbnail svg {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    #__bundler_placeholder {
        color: #999;
        font-size: 14px;
    }
    </style>

    <script>

    document.addEventListener('DOMContentLoaded', async function() {
        const loading = document.getElementById('__bundler_loading');
        function setStatus(msg) {
            if (loading)
                loading.textContent = msg;
        }

        // Error sink persists across replaceWith since it's on window, not the DOM.
        window.addEventListener('error', function(e) {
            var p = document.body || document.documentElement;
            var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
            d.id = '__bundler_err';
            d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
            d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
            '[bundle] ' + (e.message || e.type) +
            (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
        }, true);

        try {
            const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
            const templateEl = document.querySelector('script[type="__bundler/template"]');
            if (!manifestEl || !templateEl) {
                setStatus('Error: missing bundle data');
                console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
                return;
            }

            const manifest = JSON.parse(manifestEl.textContent);
            let template = JSON.parse(templateEl.textContent);

            const uuids = Object.keys(manifest);
            setStatus('Unpacking ' + uuids.length + ' assets...');

            const blobUrls = {};
            await Promise.all(uuids.map(async (uuid) => {
                const entry = manifest[uuid];
                try {
                    const binaryStr = atob(entry.data);
                    const bytes = new Uint8Array(binaryStr.length);
                    for (let i = 0; i < binaryStr.length; i++)
                        bytes[i] = binaryStr.charCodeAt(i);

                    let finalBytes = bytes;
                    if (entry.compressed) {
                        if (typeof DecompressionStream !== 'undefined') {
                            const ds = new DecompressionStream('gzip');
                            const writer = ds.writable.getWriter();
                            const reader = ds.readable.getReader();
                            writer.write(bytes);
                            writer.close();
                            const chunks = [];
                            let totalLen = 0;
                            while (true) {
                                const {done, value} = await reader.read();
                                if (done)
                                    break;
                                chunks.push(value);
                                totalLen += value.length;
                            }
                            finalBytes = new Uint8Array(totalLen);
                            let offset = 0;
                            for (const chunk of chunks) {
                                finalBytes.set(chunk, offset);
                                offset += chunk.length;
                            }
                        } else {
                            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
                        }
                    }

                    blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], {
                        type: entry.mime
                    }));
                } catch (err) {
                    console.error('Failed to decode asset ' + uuid + ':', err);
                    blobUrls[uuid] = URL.createObjectURL(new Blob([], {
                        type: entry.mime
                    }));
                }
            }));

            const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
            const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
            const resourceMap = {};
            for (const entry of extResources) {
                if (blobUrls[entry.uuid])
                    resourceMap[entry.id] = blobUrls[entry.uuid];
            }

            setStatus('Rendering...');
            for (const uuid of uuids)
                template = template.split(uuid).join(blobUrls[uuid]);

            // Strip integrity + crossorigin — blob URLs from a file:// document inherit
            // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
            // The manifest bytes are ours; SRI protects against CDN compromise, not this.
            template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

            const resourceScript = '<script>window.__resources = ' +
            JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
            ';</' + 'script>';
            // Inject after <head> so the DOCTYPE stays first; prepending the script
            // would push the parser into quirks mode. DOMParser always emits a <head>
            // (synthesizing one if the source HTML omitted it) but may carry
            // attributes through, so match the full opening tag. slice() rather than
            // replace() keeps us clear of $-pattern substitution in resourceScript.
            const headOpen = template.match(/<head[^>]*>/i);
            if (headOpen) {
                const i = headOpen.index + headOpen[0].length;
                template = template.slice(0, i) + resourceScript + template.slice(i);
            }

            // Parse the template and swap the root element. Scripts inserted via
            // DOMParser/replaceWith are inert per spec — re-create each with
            // createElement so they execute, awaiting onload for src scripts to
            // preserve ordering (React before ReactDOM before Babel before text/babel).
            const doc = new DOMParser().parseFromString(template, 'text/html');
            document.documentElement.replaceWith(doc.documentElement);
            const dead = Array.from(document.scripts);
            for (const old of dead) {
                const s = document.createElement('script');
                for (const a of old.attributes)
                    s.setAttribute(a.name, a.value);
                s.textContent = old.textContent;
                // text/babel scripts with a src: fetch and inline. transformScriptTags
                // does XHR against the src, but blob:null/ from a file:// origin is
                // silently dropped. Inlining makes it a plain inline babel script,
                // which transformScriptTags handles unconditionally.
                if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
                    const r = await fetch(s.src);
                    s.textContent = await r.text();
                    s.removeAttribute('src');
                }
                const p = s.src ? new Promise(function(r) {
                    s.onload = s.onerror = r;
                }) : null;
                old.replaceWith(s);
                if (p)
                    await p;
            }
            // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
            // which fired before we swapped the document. Trigger manually if present.
            if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
                window.Babel.transformScriptTags();
            }
        } catch (err) {
            setStatus('Error unpacking: ' + err.message);
            console.error('Bundle unpack error:', err);
        }
    });
    </script>

    "<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n<script src=\"4fc3df97-864a-4d4f-9ef2-922631c82a96\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  body { margin: 0; }\n  a { color: inherit; text-decoration: none; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif; color: oklch(20% 0.01 260); background: oklch(99% 0.002 90);\">\n\n  <!-- Nav -->\n  <nav style=\"display:flex; align-items:center; justify-content:space-between; padding: 20px 48px; border-bottom: 1px solid oklch(92% 0.005 90);\">\n    <div style=\"display:flex; align-items:center; gap:32px;\">\n      <div style=\"display:flex; align-items:center; gap:9px;\">\n        <div style=\"width:13px; height:13px; border-radius:50%; background: oklch(74% 0.19 150);\"><\u002Fdiv>\n        <span style=\"font-size:20px; font-weight:800; letter-spacing:-0.3px;\">AccentIQ<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:28px; font-size:15px; color: oklch(45% 0.01 260);\">\n        <a href=\"#product\" style=\"color: oklch(45% 0.01 260);\" style-hover=\"color: oklch(20% 0.01 260);\">Product<\u002Fa>\n        <a href=\"#how\" style=\"color: oklch(45% 0.01 260);\" style-hover=\"color: oklch(20% 0.01 260);\">How it works<\u002Fa>\n        <a href=\"#pricing\" style=\"color: oklch(45% 0.01 260);\" style-hover=\"color: oklch(20% 0.01 260);\">Pricing<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:20px;\">\n      <a href=\"#signin\" style=\"font-size:15px; color: oklch(45% 0.01 260);\" style-hover=\"color: oklch(20% 0.01 260);\">Sign In<\u002Fa>\n      <a href=\"#demo\" style=\"background: oklch(74% 0.19 150); color: oklch(18% 0.03 150); font-weight:700; font-size:14px; padding:10px 20px; border-radius:4px;\" style-hover=\"background: oklch(80% 0.19 150);\">Try Demo<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- Hero -->\n  <section style=\"position:relative; overflow:hidden; background: oklch(16% 0.02 260); padding: 96px 24px 72px; text-align:center;\">\n    <div style=\"position:absolute; inset:0; background-image: radial-gradient(oklch(30% 0.02 260) 1px, transparent 1px); background-size: 28px 28px; opacity:0.5;\"><\u002Fdiv>\n\n    <div style=\"position:relative;\">\n      <div style=\"font-size:14px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color: oklch(74% 0.19 150); margin-bottom:20px;\">App<\u002Fdiv>\n      <h1 style=\"font-size:56px; line-height:1.1; font-weight:800; color: oklch(98% 0.002 90); max-width:900px; margin:0 auto 24px; letter-spacing:-1px;\">Guess Your Accent From Just Your Voice<\u002Fh1>\n      <p style=\"font-size:19px; line-height:1.6; color: oklch(75% 0.01 260); max-width:640px; margin:0 auto 36px;\">Record a few seconds of English and see which regions your pronunciation matches most closely.<\u002Fp>\n      <a href=\"#demo\" style=\"display:inline-block; background: oklch(74% 0.19 150); color: oklch(18% 0.03 150); font-weight:700; font-size:16px; padding:15px 30px; border-radius:4px;\" style-hover=\"background: oklch(80% 0.19 150);\">Try the Demo<\u002Fa>\n\n      <div style=\"display:flex; align-items:flex-end; justify-content:center; gap:4px; height:56px; margin: 56px auto 0; max-width:760px;\">\n        <sc-for list=\"{{ waveformBars }}\" as=\"bar\" hint-placeholder-count=\"48\">\n          <div style=\"width:6px; border-radius:2px; height: {{ bar.height }}px; background: {{ bar.color }}; opacity:0.85;\"><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Feature section -->\n  <section style=\"padding: 96px 24px 110px; text-align:center;\">\n    <h2 style=\"font-size:38px; font-weight:800; letter-spacing:-0.5px; margin: 0 0 24px;\">See What You'll Discover<\u002Fh2>\n    <p style=\"font-size:18px; line-height:1.7; color: oklch(45% 0.01 260); max-width:680px; margin: 0 auto 72px;\">Pronunciation carries traces of the languages and places that shaped it. AccentIQ listens to short voice samples and matches patterns against accent profiles from around the world to estimate where your English was learned.<\u002Fp>\n\n    <div style=\"display:grid; grid-template-columns: repeat(4, 1fr); gap:44px; max-width:1100px; margin:0 auto;\">\n      <div style=\"display:flex; flex-direction:column; align-items:center;\">\n        <div style=\"width:64px; height:64px; border-radius:50%; border: 2px solid oklch(20% 0.01 260); display:flex; align-items:center; justify-content:center;\">\n          <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\">\n            <path d=\"M4 14 L8 14 L10 8 L13 20 L16 6 L19 18 L21 14 L24 14\" stroke=\"oklch(20% 0.01 260)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-weight:700; font-size:17px; margin-top:22px;\">Instant Detection<\u002Fdiv>\n        <div style=\"font-size:14.5px; color: oklch(45% 0.01 260); line-height:1.55; margin-top:10px;\">Get a result in seconds, right after you stop recording.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; align-items:center;\">\n        <div style=\"width:64px; height:64px; border-radius:50%; border: 2px solid oklch(20% 0.01 260); display:flex; align-items:center; justify-content:center;\">\n          <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\">\n            <circle cx=\"14\" cy=\"14\" r=\"10\" stroke=\"oklch(20% 0.01 260)\" stroke-width=\"1.8\"><\u002Fcircle>\n            <path d=\"M9.5 14.5 L12.5 17.5 L18.5 10.5\" stroke=\"oklch(20% 0.01 260)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-weight:700; font-size:17px; margin-top:22px;\">Confidence Score<\u002Fdiv>\n        <div style=\"font-size:14.5px; color: oklch(45% 0.01 260); line-height:1.55; margin-top:10px;\">See how strongly your voice matches each guess.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; align-items:center;\">\n        <div style=\"width:64px; height:64px; border-radius:50%; border: 2px solid oklch(20% 0.01 260); display:flex; align-items:center; justify-content:center;\">\n          <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\">\n            <path d=\"M14 4 C9.5 4 6 7.4 6 11.6 C6 17 14 24 14 24 C14 24 22 17 22 11.6 C22 7.4 18.5 4 14 4 Z\" stroke=\"oklch(20% 0.01 260)\" stroke-width=\"1.8\" stroke-linejoin=\"round\"><\u002Fpath>\n            <circle cx=\"14\" cy=\"11.6\" r=\"3\" stroke=\"oklch(20% 0.01 260)\" stroke-width=\"1.8\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-weight:700; font-size:17px; margin-top:22px;\">Region Map<\u002Fdiv>\n        <div style=\"font-size:14.5px; color: oklch(45% 0.01 260); line-height:1.55; margin-top:10px;\">View likely regions of origin plotted on a simple map.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; align-items:center;\">\n        <div style=\"width:64px; height:64px; border-radius:50%; border: 2px solid oklch(20% 0.01 260); display:flex; align-items:center; justify-content:center;\">\n          <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\">\n            <line x1=\"6\" y1=\"10\" x2=\"22\" y2=\"10\" stroke=\"oklch(20% 0.01 260)\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"6\" y1=\"14\" x2=\"22\" y2=\"14\" stroke=\"oklch(20% 0.01 260)\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fline>\n            <line x1=\"6\" y1=\"18\" x2=\"16\" y2=\"18\" stroke=\"oklch(20% 0.01 260)\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fline>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-weight:700; font-size:17px; margin-top:22px;\">Pronunciation Notes<\u002Fdiv>\n        <div style=\"font-size:14.5px; color: oklch(45% 0.01 260); line-height:1.55; margin-top:10px;\">Learn which sounds influenced the result.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Footer -->\n  <footer style=\"border-top: 1px solid oklch(92% 0.005 90); padding: 32px 24px; text-align:center; font-size:13px; color: oklch(55% 0.01 260);\">\n    © 2026 AccentIQ. Hackathon project — not affiliated with any language service.\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const greens = ['oklch(74% 0.19 150)', 'oklch(60% 0.14 220)', 'oklch(45% 0.02 260)'];\n    const waveformBars = Array.from({ length: 48 }).map((_, i) => {\n      const h = 10 + Math.round(Math.abs(Math.sin(i * 0.7)) * 44);\n      return { height: h, color: greens[i % greens.length] };\n    });\n\n    return { waveformBars };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
